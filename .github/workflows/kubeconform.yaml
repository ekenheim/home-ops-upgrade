---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Kubeconform

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Run kubeconform
        run: |
          set -euo pipefail
          # Only validate files that declare a top-level `kind:` — skips
          # helm-values, kustomizeconfig patches, app configs, etc. naturally.
          # Also exclude SOPS-encrypted secrets (their `sops:` stanza breaks
          # strict Secret schema) and Talos bootstrap files.
          # system-upgrade-controller plans use YAML merge-key anchors
          # (<<: *prepare) which Go YAML flags as duplicate keys — runtime
          # fine, strict parser not, so exclude.
          files=$(grep -rlE '^kind:[[:space:]]+[A-Z]' kubernetes \
            --include='*.yaml' --include='*.yml' \
            | grep -vE '\.sops\.|^kubernetes/bootstrap/|^kubernetes/flux/vars/|^kubernetes/templates/|system-upgrade-controller/plans/|/kubeflow/.*/patches/|/deploykf-.*/|/chart/.*/templates/' \
            || true)

          echo "Validating $(echo "$files" | wc -l) files"
          echo "$files" | xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip 'HelmRelease,Kustomization,GitRepository,HelmRepository,OCIRepository,Bucket,Receiver,Alert,Provider,ImagePolicy,ImageRepository,ImageUpdateAutomation,Plan' \
            -summary \
            -output pretty
