---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Kubeconform

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate manifests
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: >-
            -strict
            -ignore-missing-schemas
            -schema-location default
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            -skip HelmRelease,Kustomization,GitRepository,HelmRepository,OCIRepository,Bucket,Receiver,Alert,Provider,ImagePolicy,ImageRepository,ImageUpdateAutomation
            -summary
            -output pretty
            /github/workspace/kubernetes
