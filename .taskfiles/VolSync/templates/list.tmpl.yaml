---
apiVersion: batch/v1
kind: Job
metadata:
  name: "list-${app}-${ts}"
  namespace: "${ns}"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: cache
          emptyDir: {}
      containers:
        - name: list
          image: docker.io/restic/restic:0.18.1
          args: ["snapshots"]
          envFrom:
            - secretRef:
                name: "${app}-volsync"
          env:
            - name: XDG_CACHE_HOME
              value: /cache
          volumeMounts:
            - name: cache
              mountPath: /cache
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
