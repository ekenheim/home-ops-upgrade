---
# Lenient yamllint config — Flux and Helm values often break strict rules
extends: relaxed

rules:
  line-length: disable
  truthy: disable
  comments: disable
  comments-indentation: disable
  new-line-at-end-of-file: disable
  empty-lines: disable
  indentation: disable
  braces: disable
  brackets: disable
  colons: disable
  commas: disable
  document-start: disable
  trailing-spaces:
    level: warning
  key-duplicates: enable
  octal-values: disable

ignore: |
  .github/
  kubernetes/apps/datasci/kubeflow/
  kubernetes/apps/datasci/deploykf-values/
  kubernetes/apps/datasci/seldon-core/chart/
  **/templates/
  **/charts/
