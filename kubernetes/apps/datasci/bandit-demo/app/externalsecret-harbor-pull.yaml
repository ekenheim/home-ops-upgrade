---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name harbor-pull
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.${SECRET_DOMAIN}":{"username":"{{ .harbor_user }}","password":"{{ .harbor_password }}"}}}
  dataFrom:
    - extract:
        key: bandit-demo
