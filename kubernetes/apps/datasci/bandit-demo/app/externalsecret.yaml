---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name bandit-demo-secret
spec:
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        MLFLOW_TRACKING_URI: "{{ .mlflow_tracking_uri }}"
        MLFLOW_TRACKING_USERNAME: "{{ .mlflow_username }}"
        MLFLOW_TRACKING_PASSWORD: "{{ .mlflow_password }}"
        AWS_ACCESS_KEY_ID: "{{ .minio_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ .minio_secret_key }}"
        MLFLOW_S3_ENDPOINT_URL: "{{ .minio_endpoint }}"
  data:
    - secretKey: mlflow_tracking_uri
      remoteRef:
        key: bandit-demo
        property: mlflow_tracking_uri
    - secretKey: mlflow_username
      remoteRef:
        key: bandit-demo
        property: mlflow_username
    - secretKey: mlflow_password
      remoteRef:
        key: bandit-demo
        property: mlflow_password
    - secretKey: minio_access_key
      remoteRef:
        key: bandit-demo
        property: minio_access_key
    - secretKey: minio_secret_key
      remoteRef:
        key: bandit-demo
        property: minio_secret_key
    - secretKey: minio_endpoint
      remoteRef:
        key: bandit-demo
        property: minio_endpoint
