---
apiVersion: mlops.seldon.io/v1alpha1
kind: Model
metadata:
  name: bandit-epsilon-greedy
  labels:
    app.kubernetes.io/name: bandit-demo
    app.kubernetes.io/component: seldon-model
spec:
  storageUri: "harbor.${SECRET_DOMAIN}/development/bandit-models/bandit-epsilon-greedy:latest"
  server: bandit-mlserver
  requirements:
    - mlserver-custom
  secretName: bandit-demo-secret
  memory: 256Mi
  parameters:
    - name: implementation
      value: bandit_runtime.epsilon_greedy.EpsilonGreedyModel
    - name: n_arms
      value: "5"
    - name: mlflow_experiment
      value: bandit-epsilon-greedy
    - name: epsilon
      value: "0.1"
---
