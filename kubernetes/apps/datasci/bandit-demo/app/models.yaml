---
apiVersion: mlops.seldon.io/v1alpha1
kind: Model
metadata:
  name: epsilon-greedy
  labels:
    app.kubernetes.io/name: bandit-demo
    app.kubernetes.io/component: seldon-model
spec:
  storageUri: "s3://bandit-models/epsilon-greedy"
  secretName: seldon-core-secret
  server: bandit-mlserver
  requirements:
    - mlserver
  memory: 128Mi
  parameters:
    - name: implementation
      value: epsilon_greedy.EpsilonGreedyModel
    - name: n_arms
      value: "5"
    - name: mlflow_experiment
      value: bandit-epsilon-greedy
    - name: epsilon
      value: "0.1"
