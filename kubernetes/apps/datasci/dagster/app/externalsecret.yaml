---
# ENTSO-E Transparency API token for grid-reliance run pods (and Spark ENTSO-E ingest). Store in Bitwarden as key "grid-reliance-entsoe" with field ENTSOE_API_KEY.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-entsoe
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grid-reliance-entsoe
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        ENTSOE_API_KEY: "{{ .ENTSOE_API_KEY }}"
        ENTSOE_TOKEN: "{{ .ENTSOE_API_KEY }}"
  dataFrom:
    - extract:
        key: grid-reliance-entsoe
---
# Copernicus CDS API key for fetch_era5_bronze Dagster asset.
# Add to Bitwarden: key "grid-reliance-cdsapi", field CDSAPI_KEY.
# Get your key at: https://cds.climate.copernicus.eu/profile (API key section).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-cdsapi
  namespace: datasci
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grid-reliance-cdsapi
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        CDSAPI_KEY: "{{ .CDSAPI_KEY }}"
  dataFrom:
    - extract:
        key: grid-reliance-cdsapi
---
# Postgres for grid-reliance run pods launched by K8sRunLauncher in datasci.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-postgres
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: grid-reliance-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        PG_CONNECTION_STRING: 'postgresql://{{ .user }}:{{ .password }}@{{ index . "pgbouncer-host" }}:5432/{{ .dbname }}'
        DAGSTER_PG_PASSWORD: '{{ .password }}'
        DAGSTER_PG_USER: '{{ .user }}'
        DAGSTER_PG_DB: '{{ .dbname }}'
  dataFrom:
    - extract:
        key: postgres-pguser-gridreliance
---
# MinIO creds for alphaos run pods (market-data pipeline writes to the "stocks-us" bucket on
# the LAN MinIO). Reuses the SAME Bitwarden item as hempriser ("hempriser-minio") — same MinIO,
# same keys — just remapped to the names AlphaOS expects (MINIO_ENDPOINT_URL / *_ACCESS_KEY_ID /
# *_SECRET_ACCESS_KEY). The endpoint is non-secret (same s3-lan the dashboard uses) so it's a
# literal; only the access/secret keys come from Bitwarden.
# Attached to alphaos run pods ONLY, via the dagster-k8s/config env_from tag in marketdata/
# dagster_defs.py (v0.5.1) — NOT in the global runLauncher.envSecrets (avoids cred spray).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alphaos-minio-rw
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alphaos-minio-rw
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        MINIO_ENDPOINT_URL: "http://s3-lan.ekenhome.se:9000"
        MINIO_ACCESS_KEY_ID: "{{ .MINIO_ACCESS_KEY }}"
        MINIO_SECRET_ACCESS_KEY: "{{ .MINIO_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: hempriser-minio
---
# massive.com (Massive.com flatfile) S3 creds for alphaos run pods (market-data fetch source).
# AlphaOS reads MASSIVE_S3_ACCESS_KEY_ID / MASSIVE_S3_SECRET_ACCESS_KEY.
# TODO: create Bitwarden item "alphaos-massive" with fields
#   MASSIVE_S3_ACCESS_KEY_ID, MASSIVE_S3_SECRET_ACCESS_KEY.
# Attached to alphaos run pods ONLY, via the dagster-k8s/config env_from tag (v0.5.1).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alphaos-massive
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alphaos-massive
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        MASSIVE_S3_ACCESS_KEY_ID: "{{ .MASSIVE_S3_ACCESS_KEY_ID }}"
        MASSIVE_S3_SECRET_ACCESS_KEY: "{{ .MASSIVE_S3_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: alphaos-massive
