---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dashclaw-secret
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        DASHCLAW_API_KEY: "{{ .DASHCLAW_API_KEY }}"
        ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"
        CRON_SECRET: "{{ .CRON_SECRET }}"
        DASHCLAW_LOCAL_ADMIN_PASSWORD: "{{ .DASHCLAW_LOCAL_ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: dashclaw
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dashclaw-db-secret
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: *name
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        DATABASE_URL: 'postgresql://{{ .user }}:{{ .password }}@{{ index . "pgbouncer-host" }}:5432/{{ .dbname }}'
  dataFrom:
    - extract:
        key: postgres-pguser-dashclaw
