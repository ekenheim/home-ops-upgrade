---
# Grid Resilience API (datasci) at grid-reliance.${SECRET_DOMAIN}. Serves from Gold bucket.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grid-reliance-api
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: api
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grid Reliance API
    gethomepage.dev/group: Data Science
spec:
  ingressClassName: internal
  rules:
    - host: grid-reliance.${SECRET_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grid-reliance-api
                port:
                  number: 8000
  tls:
    - hosts:
        - grid-reliance.${SECRET_DOMAIN}
