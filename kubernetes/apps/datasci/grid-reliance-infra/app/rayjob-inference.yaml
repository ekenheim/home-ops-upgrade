---
# Bayesian grid model inference RayJob.
# Submitter: grid-resilience-inference image.
# Workers: grid-resilience-ray-worker image (PyMC/nutpie/arviz pre-installed — no runtime_env pip).
# Reads silver/grid_snapshots.parquet from Silver, writes model + forecasts to Gold.
# Ray cluster: ray-kuberay (datasci namespace), version 2.54.0.
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: grid-resilience-inference
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: inference
spec:
  entrypoint: python -m inference.run_inference
  clusterSelector:
    ray.io/cluster: ray-kuberay
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 86400
  submitterPodTemplate:
    metadata:
      annotations:
        descheduler.alpha.kubernetes.io/evict: "false"
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: ray-job-submitter
          image: ghcr.io/ekenheim/grid-resilience-inference:v1.0.16
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          imagePullPolicy: IfNotPresent
          env:
            - name: SILVER_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-silver
                  key: AWS_ACCESS_KEY_ID
            - name: SILVER_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-silver
                  key: AWS_SECRET_ACCESS_KEY
            - name: SILVER_BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_HOST
            - name: SILVER_BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_PORT
            - name: SILVER_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_NAME
            - name: GOLD_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-gold
                  key: AWS_ACCESS_KEY_ID
            - name: GOLD_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-gold
                  key: AWS_SECRET_ACCESS_KEY
            - name: GOLD_BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-gold
                  key: BUCKET_HOST
            - name: GOLD_BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-gold
                  key: BUCKET_PORT
            - name: GOLD_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-gold
                  key: BUCKET_NAME
