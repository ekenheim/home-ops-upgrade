---
# Bayesian grid model inference RayJob. Runs on the existing KubeRay cluster (ray-kuberay) in datasci.
# Reference: grid-resilience repo inference/bayesian-grid-model.yaml.
# Replace entrypoint/runtimeEnvYAML with inference image once ghcr.io/ekenheim/grid-resilience-inference:v1.0.5 is published.
# Silver and Gold OBC credentials are on Ray head/worker pods (datasci/ray helmrelease) and on the submitter below.
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: grid-resilience-inference
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: inference
spec:
  entrypoint: python -m inference.bayesian_grid_model
  clusterSelector:
    ray.io/cluster: ray-kuberay
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 86400
  submitterPodTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: ray-job-submitter
          envFrom:
            - configMapRef:
                name: grid-resilience-silver
            - secretRef:
                name: grid-resilience-silver
            - configMapRef:
                name: grid-resilience-gold
            - secretRef:
                name: grid-resilience-gold
