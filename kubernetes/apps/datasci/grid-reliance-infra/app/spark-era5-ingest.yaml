---
# Spark ERA5 ingest: reads Bronze (Rook), writes silver/grid_snapshots.parquet to Silver (Rook).
# Image: ghcr.io/ekenheim/grid-resilience-data-engineering (FROM apache/spark:4.0.2-python3)
# Env vars use BRONZE_*/SILVER_* prefixes matching spark_era5_ingest.py env reads.
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: grid-resilience-era5-ingest
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: era5-ingest
spec:
  type: Python
  mode: cluster
  image: ghcr.io/ekenheim/grid-resilience-data-engineering:v1.0.18
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - ghcr-pull
  sparkVersion: "4.0.2"
  mainApplicationFile: local:///opt/spark/job/spark_era5_ingest.py
  driver:
    serviceAccount: spark
    cores: 1
    memory: 1g
    securityContext:
      runAsNonRoot: true
      runAsUser: 185
      runAsGroup: 185
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }
    env:
      - name: BRONZE_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_ACCESS_KEY_ID
      - name: BRONZE_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_SECRET_ACCESS_KEY
      - name: BRONZE_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_HOST
      - name: BRONZE_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_PORT
      - name: BRONZE_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_NAME
      - name: SILVER_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-silver
            key: AWS_ACCESS_KEY_ID
      - name: SILVER_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-silver
            key: AWS_SECRET_ACCESS_KEY
      - name: SILVER_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_HOST
      - name: SILVER_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_PORT
      - name: SILVER_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_NAME
  executor:
    cores: 2
    instances: 2
    memory: 2g
    securityContext:
      runAsNonRoot: true
      runAsUser: 185
      runAsGroup: 185
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }
    env:
      - name: BRONZE_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_ACCESS_KEY_ID
      - name: BRONZE_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_SECRET_ACCESS_KEY
      - name: BRONZE_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_HOST
      - name: BRONZE_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_PORT
      - name: BRONZE_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_NAME
      - name: SILVER_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-silver
            key: AWS_ACCESS_KEY_ID
      - name: SILVER_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-silver
            key: AWS_SECRET_ACCESS_KEY
      - name: SILVER_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_HOST
      - name: SILVER_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_PORT
      - name: SILVER_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-silver
            key: BUCKET_NAME
  restartPolicy:
    type: Never
