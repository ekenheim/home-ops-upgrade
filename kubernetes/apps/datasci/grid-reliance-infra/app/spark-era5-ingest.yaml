---
# Spark ERA5 ingest (reference: grid-resilience repo data-engineering/processing/spark-era5-ingest.yaml).
# PLACEHOLDER: uses the official Apache Spark image. Replace with the real data-engineering image when ready:
#   image: ghcr.io/ekenheim/grid-resilience-data-engineering:v1.0.0
#   mainApplicationFile: local:///opt/spark/job/spark_era5_ingest.py
#   imagePullSecrets: [ghcr-pull]
# Secret/ConfigMap names match Rook ObjectBucketClaims: grid-resilience-bronze (read), grid-resilience-silver (write).
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: grid-resilience-era5-ingest
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: era5-ingest
spec:
  type: Python
  mode: cluster
  image: apache/spark:4.1.1-python3
  imagePullPolicy: IfNotPresent
  sparkVersion: "4.0.2"
  mainApplicationFile: local:///opt/spark/examples/src/main/python/pi.py
  driver:
    serviceAccount: spark
    cores: 1
    memory: 1g
    envFrom:
      - configMapRef:
          name: grid-resilience-bronze
      - secretRef:
          name: grid-resilience-bronze
      - configMapRef:
          name: grid-resilience-silver
      - secretRef:
          name: grid-resilience-silver
  executor:
    cores: 2
    instances: 2
    memory: 2g
    envFrom:
      - configMapRef:
          name: grid-resilience-bronze
      - secretRef:
          name: grid-resilience-bronze
      - configMapRef:
          name: grid-resilience-silver
      - secretRef:
          name: grid-resilience-silver
  restartPolicy:
    type: Never
