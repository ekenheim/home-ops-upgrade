---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Grid Resilience data platform infra: OBCs (Bronze/Silver/Gold), API (serves Gold), RayJob, Spark jobs.
# Must live in datasci — Spark operator watches this namespace and the Ray cluster runs here.
# App code (pipeline, generator) lives in development/grid-reliance.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grid-reliance-infra
  namespace: flux-system
spec:
  targetNamespace: datasci
  commonMetadata:
    labels:
      app.kubernetes.io/name: grid-reliance
  path: ./kubernetes/apps/datasci/grid-reliance-infra/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: rook-ceph-cluster
    - name: spark-operator
    - name: ray
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
