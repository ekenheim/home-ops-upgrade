---
# Spark ENTSO-E ingest (second data source; reference: grid-resilience repo data-engineering/processing).
# PLACEHOLDER: image is public so driver pods don't ErrImagePull. Replace with your built image when ready:
#   image: ghcr.io/ekenheim/grid-resilience-data-engineering:v1.0.0
#   mainApplicationFile: local:///opt/spark/job/entsoe_ingest.py
#   imagePullSecrets: [ghcr-pull]
# Fetches grid/transmission data from ENTSO-E using ENTSOE_API_KEY; uses grid-reliance-entsoe, Bronze, Silver.
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: grid-resilience-entsoe-ingest
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: entsoe-ingest
spec:
  type: Python
  mode: cluster
  image: bitnami/spark:3.5
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/bitnami/spark/examples/src/main/python/pi.py
  driver:
    serviceAccount: spark
    cores: 1
    memory: 1g
    envFrom:
      - secretRef:
          name: grid-reliance-entsoe
      - configMapRef:
          name: grid-resilience-bronze
      - secretRef:
          name: grid-resilience-bronze
      - configMapRef:
          name: grid-resilience-silver
      - secretRef:
          name: grid-resilience-silver
  executor:
    cores: 2
    instances: 2
    memory: 2g
    envFrom:
      - secretRef:
          name: grid-reliance-entsoe
      - configMapRef:
          name: grid-resilience-bronze
      - secretRef:
          name: grid-resilience-bronze
      - configMapRef:
          name: grid-resilience-silver
      - secretRef:
          name: grid-resilience-silver
  restartPolicy:
    type: Never
