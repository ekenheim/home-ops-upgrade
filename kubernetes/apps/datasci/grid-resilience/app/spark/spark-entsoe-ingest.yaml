---
# Placeholder: ENTSO-E grid data ingest into Bronze. Replace image and mainApplicationFile from grid-reliance data-engineering.
# See spark/README.md. Runs in datasci (Spark operator jobNamespaces).
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: grid-resilience-entsoe-ingest
  namespace: datasci
  labels:
    app.kubernetes.io/name: grid-resilience
    app.kubernetes.io/component: spark-entsoe
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: ghcr.io/ekenheim/grid-reliance-data-engineering:v1.0.0
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///app/entsoe_ingest.py
  sparkVersion: "3.5"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 60
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
    labels:
      app.kubernetes.io/name: grid-resilience
    serviceAccount: default
    envFrom:
      - secretRef:
          name: grid-resilience-bronze
  executor:
    cores: 2
    instances: 2
    memory: "2g"
    labels:
      app.kubernetes.io/name: grid-resilience
    envFrom:
      - secretRef:
          name: grid-resilience-bronze
