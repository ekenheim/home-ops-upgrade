---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
                PLUGIN_DIR=/opt/data/plugins/agentmemory
                mkdir -p "$PLUGIN_DIR"
                cp /tmp/agentmemory-plugin/plugin.yaml "$PLUGIN_DIR/plugin.yaml"
                cp /tmp/agentmemory-plugin/__init__.py "$PLUGIN_DIR/__init__.py"
                chown -R 10000:10000 /opt/data/plugins
        containers:
          app:
            image: &image
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            args: ["gateway", "run", "--no-supervise"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: "${TIMEZONE}"
              AGENTMEMORY_URL: http://agentmemory.datasci:3111
              AGENTMEMORY_PROJECT: hermes
              AGENTMEMORY_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: hermes
                    key: AGENTMEMORY_SECRET
            envFrom:
              - secretRef:
                  name: hermes
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 2Gi
            ports:
              - name: http
                containerPort: 8642
                protocol: TCP
              - name: codeserver
                containerPort: 12321
                protocol: TCP
          dashboard:
            image: *image
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure
            env:
              TZ: "${TIMEZONE}"
              GATEWAY_HEALTH_URL: http://localhost:8642
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
            ports:
              - name: http
                containerPort: 9119
                protocol: TCP
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.125.0@sha256:9a7848dd2627158e3873f88bd8743807a4168e4d580f26ec0cbc132a9d9ee78e
            args:
              - --auth
              - none
              - --user-data-dir
              - /home/node/.vscode
              - --extensions-dir
              - /home/node/.vscode
              - --port
              - "12321"
              - /opt/data
            env:
              TZ: "${TIMEZONE}"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8642
          codeserver:
            port: 12321
      dashboard:
        controller: *app
        ports:
          http:
            port: 9119
    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Data Science
          gethomepage.dev/name: Hermes
          gethomepage.dev/icon: mdi-robot
          gethomepage.dev/description: Hermes agent gateway
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: dashboard
                  port: http
      code:
        className: internal
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: "{{ .Release.Name }}-code.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: codeserver
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: hermes-config
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
      plugin:
        type: configMap
        name: hermes-agentmemory-plugin
        globalMounts:
          - path: /tmp/agentmemory-plugin
