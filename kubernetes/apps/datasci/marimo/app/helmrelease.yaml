---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app marimo
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      marimo:
        initContainers:
          seed-notebooks:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                for f in /seed/*.py; do
                  dest="/home/marimo/$(basename $f)"
                  if [ ! -f "$dest" ]; then
                    echo "Seeding $dest"
                    cp "$f" "$dest"
                  fi
                done
        containers:
          app:
            image:
              repository: ghcr.io/marimo-team/marimo
              tag: 0.23.4
            command:
              - marimo
            args:
              - edit
              - --host
              - "0.0.0.0"
              - --port
              - "2718"
              - --no-token
            workingDir: /home/marimo
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 2718

    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Data Science
          gethomepage.dev/name: Marimo
          gethomepage.dev/icon: https://marimo.io/favicon.ico
          gethomepage.dev/description: Reactive Python notebook environment
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: &host marimo.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      notebooks:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: marimo-notebooks
        globalMounts:
          - path: /home/marimo
      seed:
        enabled: true
        type: configMap
        name: marimo-seed-notebooks
        globalMounts:
          - path: /seed
            readOnly: true
