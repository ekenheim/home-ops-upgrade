---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Syncs env vars for the openclaw app. In Bitwarden, create an item (e.g. "openclaw") with
# fields matching the template keys below; add a "dashclaw" item for DASHCLAW_* if needed.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        GITHUB_APP_CLIENT_ID: "{{ .MISO_BOT_CLIENT_ID }}"
        GITHUB_APP_CLIENT_SECRET: "{{ .MISO_BOT_CLIENT_SECRET }}"
        GITHUB_APP_ID: "{{ .MISO_BOT_ID }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .MISO_BOT_INSTALLATION_ID }}"
        GITHUB_APP_PRIVATE_KEY: "{{ .MISO_BOT_PRIVATE_KEY }}"
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        GOOGLE_AI_STUDIO_API_KEY: "{{ .GOOGLE_GEMINI_API_KEY }}"
        CEREBRAS_API_KEY: "{{ .CEREBRAS_API_KEY }}"
        GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
        MISTRAL_API_KEY: "{{ .MISTRAL_API_KEY }}"
        KIMI_CODING_API_KEY: "{{ .KIMI_CODE_API_KEY }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        HA_URL: "https://hass.jory.dev"
        HA_TOKEN: "{{ .HOME_ASSISTANT_TOKEN }}"
        COMMONS_API_KEY: "{{ .AGENTCOMMONS_API_KEY }}"
        INSTAGRAM_BASIC_TOKEN: "{{ .INSTAGRAM_BASIC_TOKEN }}"
        INSTAGRAM_SHORT_LIVED_GRAPH_TOKEN: "{{ .INSTAGRAM_GRAPH_TOKEN }}"
        FACEBOOK_APP_ID: "{{ .FACEBOOK_APP_ID }}"
        FACEBOOK_APP_SECRET: "{{ .FACEBOOK_APP_SECRET }}"
        DASHCLAW_API_KEY: "{{ .DASHCLAW_API_KEY }}"
        DASHCLAW_BASE_URL: "https://dashclaw.${SECRET_DOMAIN}"
  dataFrom:
    - extract:
        key: openclaw
    - extract:
        key: dashclaw
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Produces Secret "openclaw-config" with key "openclaw.json" for the app config file.
# Template vars are filled from Bitwarden item "openclaw".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: openclaw-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        openclaw.json: |
          {
            "agents": {
              "defaults": {
                "model": {
                  "primary": "minimax/MiniMax-M2.5",
                  "fallbacks": ["openai-codex/gpt-5.2", "kimi-coding/k2p5", "localai/gpt-oss-120b"]
                },
                "maxConcurrent": 4,
                "timeoutSeconds": 300
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Miso",
                  "heartbeat": { "every": "30m" },
                  "workspace": "/home/node/.openclaw/workspace",
                  "agentDir": "/home/node/.openclaw/agents/main/agent"
                }
              ]
            },
            "gateway": {
              "auth": { "mode": "token", "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}" },
              "controlUi": { "allowedOrigins": ["https://openclaw.${SECRET_DOMAIN}"] },
              "mode": "local",
              "port": 18789,
              "trustedProxies": ["10.42.0.0/16", "192.168.0.0/16"]
            },
            "channels": {
              "discord": {
                "blockStreaming": true,
                "groupPolicy": "allowlist",
                "accounts": {
                  "default": {
                    "token": "{{ .DISCORD_BOT_TOKEN }}",
                    "guilds": {
                      "{{ .DISCORD_SERVER_ID }}": {
                        "channels": { "{{ .MISO_CHANNEL_ID }}": { "allow": true, "requireMention": true } }
                      }
                    }
                  }
                }
              }
            },
            "bindings": [
              { "agentId": "main", "match": { "channel": "discord", "accountId": "default" } }
            ]
          }
  dataFrom:
    - extract:
        key: openclaw
