# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seldon-core
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: seldon-core-secret
    template:
      # Seldon v2 agent expects exactly 1 key per secret.
      # The key name becomes the rclone remote name; value must be YAML
      # matching RcloneConfigCreate {type, name, parameters} — not INI format.
      # See: seldon-rclone-gs-public secret in the runtime chart for reference.
      data:
        s3: |
          type: "s3"
          name: "s3"
          parameters:
            provider: "Minio"
            env_auth: "false"
            access_key_id: "{{ .MINIO_ROOT_USER }}"
            secret_access_key: "{{ .MINIO_ROOT_PASSWORD }}"
            endpoint: "http://minio.storage.svc.cluster.local:9000"
  dataFrom:
    - extract:
        key: minio
