---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seldon-core-v2-runtime
spec:
  interval: 30m
  dependsOn:
    - name: seldon-core-v2-setup
  chart:
    spec:
      chart: kubernetes/apps/datasci/seldon-core/chart/seldon-core-v2-runtime
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: home-kubernetes
        namespace: flux-system
  install:
    # The SeldonRuntime CR becomes Ready only after the scheduler connects to Kafka.
    # Disabling wait allows Flux to succeed immediately; readiness converges in background.
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Disable Kafka-dependent components — Pipelines not needed for bandit use case.
    # Re-enable if Seldon Core v2 Pipelines are required in future (wire to Redpanda).
    dataflow:
      disable: true
    modelgateway:
      disable: true
    pipelinegateway:
      disable: true
    config:
      agentConfig:
        rclone:
          # Inject rclone S3 config for model artifact loading from MinIO
          configSecrets:
            - seldon-core-secret
      # Wire to Redpanda (Kafka-compatible) for scheduler connectivity.
      # The scheduler requires a Kafka broker to reach Ready status and to
      # reconcile Experiment CRs. Redpanda runs in the development namespace.
      kafkaConfig:
        bootstrap: "redpanda-0.redpanda.development.svc.cluster.local:9093"
      tracingConfig:
        # No OpenTelemetry collector deployed — disable tracing
        disable: true
