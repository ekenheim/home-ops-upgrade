---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seldon-core-v2-setup
spec:
  interval: 30m
  dependsOn:
    - name: seldon-core-v2-crds
  chart:
    spec:
      chart: kubernetes/apps/datasci/seldon-core/chart/seldon-core-v2-setup
      # Track git commit revisions so template changes are picked up without bumping Chart.yaml
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: home-kubernetes
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controller:
      # Watch all namespaces so bandit resources in development/datasci are reconciled
      clusterwide: true
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
