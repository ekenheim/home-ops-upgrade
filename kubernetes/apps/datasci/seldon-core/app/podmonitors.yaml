---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-controller-manager
  namespace: datasci
spec:
  jobLabel: seldon-v2-controller
  selector:
    matchLabels:
      control-plane: v2-controller-manager
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
# Envoy proxy — exposes per-model request rates, latencies, error codes.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-envoy
  namespace: datasci
spec:
  jobLabel: seldon-v2-envoy
  namespaceSelector:
    matchNames:
      - datasci
  selector:
    matchLabels:
      app.kubernetes.io/name: seldon-envoy
  podMetricsEndpoints:
    - port: envoy-stats
      path: /stats/prometheus
      interval: 15s
---
# Covers MLServer and Triton server pods (agent sidecar metrics).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-servers
  namespace: datasci
spec:
  jobLabel: seldon-v2-servers
  namespaceSelector:
    matchNames:
      - datasci
  selector:
    matchExpressions:
      - key: seldon-server-name
        operator: Exists
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
