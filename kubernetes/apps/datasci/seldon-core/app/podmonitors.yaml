---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-controller-manager
  namespace: datasci
spec:
  jobLabel: seldon-v2-controller
  selector:
    matchLabels:
      control-plane: v2-controller-manager
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
# Covers scheduler, envoy, hodometer, and other runtime pods created
# by the Seldon operator from the SeldonRuntime CR.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-runtime
  namespace: datasci
spec:
  jobLabel: seldon-v2-runtime
  namespaceSelector:
    matchNames:
      - datasci
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - seldon-envoy
          - seldon-modelgateway
          - seldon-scheduler
          - hodometer
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
# Covers MLServer and Triton pods deployed as Servers by the operator.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seldon-v2-servers
  namespace: datasci
spec:
  jobLabel: seldon-v2-servers
  namespaceSelector:
    matchNames:
      - datasci
  selector:
    matchExpressions:
      - key: seldon-server-name
        operator: Exists
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
