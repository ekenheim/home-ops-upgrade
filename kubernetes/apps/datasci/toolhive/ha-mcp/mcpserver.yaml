---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: ha-mcp
spec:
  image: ghcr.io/homeassistant-ai/ha-mcp:7.8.0
  transport: streamable-http
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant.default.svc.cluster.local:8123
  secrets:
    - name: toolhive-home-assistant
      key: HOMEASSISTANT_TOKEN
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - ha-mcp-web
          # toolhive enforces readOnlyRootFilesystem, so Python's
          # tempfile.gettempdir() finds no writable dir and the server
          # crashes on startup with "No usable temporary directory found".
          # A writable emptyDir at /tmp lets it fall back to /tmp/ha-mcp.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
