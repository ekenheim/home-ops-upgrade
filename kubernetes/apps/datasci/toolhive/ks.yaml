---
# yaml-language-server: $schema=https://kubernetes-schemas.minuette.horse/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app toolhive-crds
  namespace: flux-system
spec:
  path: ./kubernetes/apps/datasci/toolhive/crds
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: datasci
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.minuette.horse/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app toolhive
  namespace: flux-system
spec:
  path: ./kubernetes/apps/datasci/toolhive/app
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: datasci
  dependsOn:
    - name: toolhive-crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
