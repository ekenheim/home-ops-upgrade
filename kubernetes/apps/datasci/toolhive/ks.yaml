---
# yaml-language-server: $schema=https://kubernetes-schemas.minuette.horse/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ha-mcp
  namespace: flux-system
spec:
  path: ./kubernetes/apps/datasci/toolhive/ha-mcp
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: datasci
  dependsOn:
    - name: toolhive
    - name: external-secrets-stores
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.minuette.horse/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app memory-mcp
  namespace: flux-system
spec:
  path: ./kubernetes/apps/datasci/toolhive/memory-mcp
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: datasci
  dependsOn:
    - name: toolhive
    - name: rook-ceph-cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
