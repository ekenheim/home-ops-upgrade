---
# AlphaOS — V2-FRONTIER portfolio tracker (FastAPI dashboard). All state in Postgres;
# no market-data/MinIO and no local files. Public image, no imagePullSecret needed.
# Exposed via internal Ingress at alphaos.${SECRET_DOMAIN}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaos
  namespace: development
  labels:
    app.kubernetes.io/name: alphaos
    app.kubernetes.io/component: app
spec:
  # Single replica; all state is in Postgres (no RWO volume to share).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alphaos
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alphaos
        app.kubernetes.io/component: app
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        # Migrate the Postgres schema before the app starts. Migration 0002 drops the old
        # ledger tables and creates the V2-FRONTIER schema.
        # Uses the DIRECT primary uri (DATABASE_URL) — DDL must not go through PgBouncer.
        - name: db-migrate
          image: ghcr.io/ekenheim/alphaos:sha-92c48cd
          command: ["alphaos", "db", "upgrade"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphaos-postgres
                  key: DATABASE_URL
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
        # Idempotent seed of the 5 sleeves.
        - name: db-seed
          image: ghcr.io/ekenheim/alphaos:sha-92c48cd
          command: ["alphaos", "db", "seed"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphaos-postgres
                  key: DATABASE_URL
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      containers:
        - name: app
          image: ghcr.io/ekenheim/alphaos:sha-92c48cd
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8503
              protocol: TCP
          envFrom:
            # Postgres (DATABASE_URL direct + DATABASE_URL_POOLED).
            - secretRef:
                name: alphaos-postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Initial dashboard computation takes 10–30s; startupProbe guards the cold start.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            failureThreshold: 6
