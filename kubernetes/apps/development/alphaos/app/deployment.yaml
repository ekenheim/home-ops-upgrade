---
# AlphaOS — V2-FRONTIER portfolio tracker (FastAPI dashboard). State in Postgres; no local files.
# Reads the read-only stocks-us MinIO bucket (s3-lan) for US-stock pricing; FX is fetched live
# from Riksbank/ECB (outbound internet). Public image, no imagePullSecret needed.
# Exposed via internal Ingress at alphaos.${SECRET_DOMAIN}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaos
  namespace: development
  labels:
    app.kubernetes.io/name: alphaos
    app.kubernetes.io/component: app
spec:
  # Single replica; all state is in Postgres (no RWO volume to share).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alphaos
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alphaos
        app.kubernetes.io/component: app
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        # Migrate the Postgres schema before the app starts (alembic; currently up to 0005 —
        # transactions ledger; positions are derived from it).
        # Uses the DIRECT primary uri (DATABASE_URL) — DDL must not go through PgBouncer.
        - name: db-migrate
          image: ghcr.io/ekenheim/alphaos:sha-e622acb
          command: ["alphaos", "db", "upgrade"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphaos-postgres
                  key: DATABASE_URL
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
        # Idempotent seed of the 5 sleeves.
        - name: db-seed
          image: ghcr.io/ekenheim/alphaos:sha-e622acb
          command: ["alphaos", "db", "seed"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphaos-postgres
                  key: DATABASE_URL
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      containers:
        - name: app
          image: ghcr.io/ekenheim/alphaos:sha-e622acb
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8503
              protocol: TCP
          env:
            # Read the read-only stocks-us bucket for US-stock pricing.
            - name: ALPHAOS_USE_MINIO
              value: "1"
            - name: MINIO_BUCKET
              value: "stocks-us"
            # LAN MinIO that holds stocks-us. Plain http on :9000 (no TLS).
            # NOT the in-cluster minio-secondary, which has no stocks-us bucket.
            - name: MINIO_ENDPOINT_URL
              value: "http://s3-lan.ekenhome.se:9000"
          envFrom:
            # MinIO creds (read-only); optional so the app starts even if the secret lags.
            - secretRef:
                name: alphaos-minio
                optional: true
            # Postgres (DATABASE_URL direct + DATABASE_URL_POOLED).
            - secretRef:
                name: alphaos-postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Initial dashboard computation takes 10–30s; startupProbe guards the cold start.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            failureThreshold: 6
