---
# Dagster code location (gRPC server on port 4000).
# Registered in Dagster workspace: bandit-pipeline.development.svc.cluster.local:4000
# Contains: bandit_refit_job (hourly schedule) — reads Postgres reward log,
# refits Beta posteriors via PyMC on Ray, writes to DragonflyDB, logs to MLflow.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bandit-pipeline
  namespace: development
  labels:
    app.kubernetes.io/name: bandit
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bandit
      app.kubernetes.io/component: pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bandit
        app.kubernetes.io/component: pipeline
    spec:
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: pipeline
          image: ghcr.io/ekenheim/bandit-pipeline:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: bandit-postgres
          env:
            - name: DAGSTER_HOME
              value: "/tmp/dagster"
            - name: DAGSTER_MODULE_NAME
              value: "bandit_pipeline.definitions"
            - name: DAGSTER_CURRENT_IMAGE
              value: "ghcr.io/ekenheim/bandit-pipeline:latest"
            - name: DRAGONFLY_HOST
              value: "dragonfly-master.database.svc.cluster.local"
            - name: DRAGONFLY_PORT
              value: "6379"
            - name: DRAGONFLY_DB
              value: "2"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.datasci.svc.cluster.local:5000"
            - name: RAY_ADDRESS
              value: "ray://ray-kuberay-head-svc.datasci.svc.cluster.local:10001"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 5
