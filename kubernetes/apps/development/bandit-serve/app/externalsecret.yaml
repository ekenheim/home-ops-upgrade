---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bandit-serve
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: bandit-serve-secret
    template:
      data:
        # DragonflyDB connection — db 2 isolates bandit state
        DRAGONFLY_HOST: dragonfly-master.database.svc.cluster.local
        DRAGONFLY_PORT: "6379"
        DRAGONFLY_DB: "2"
        # Postgres reward log — uses pgbouncer in transaction mode; safe for INSERT-only workload
        BANDIT_DATABASE_URL: "postgresql://{{ .PGUSER }}:{{ .PGPASSWORD }}@postgres-pgbouncer.database.svc.cluster.local:5432/{{ .PGDATABASE }}"
        # Strapi API token for fetching Arm entries (read-only token)
        STRAPI_API_TOKEN: "{{ .STRAPI_API_TOKEN }}"
  dataFrom:
    - extract:
        key: bandit-postgres
    - extract:
        key: bandit-strapi
