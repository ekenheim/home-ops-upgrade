---
# Seldon v2 Experiment — routes inference traffic across bandit arms.
#
# Weight semantics: static percentage split (must sum to 100).
# The Dagster bandit-pipeline updates these weights after each posterior fit,
# setting each arm's weight proportional to its Thompson mean α/(α+β).
# This gives Seldon-level observability (metrics, traces) aligned with the
# posterior without adding per-request latency to the hot path.
#
# Hot-path decision-making (dynamic Thompson sampling) stays in bandit-service.
# The Experiment is an outer observability/routing layer only.
apiVersion: mlops.seldon.io/v1alpha1
kind: Experiment
metadata:
  name: bandit-experiment
  namespace: development
  labels:
    app.kubernetes.io/name: bandit
    app.kubernetes.io/component: seldon-experiment
spec:
  # Fallback when the experiment is inactive or a candidate is not ready.
  default: bandit-arm-0
  # resourceType defaults to "model" — candidates reference Model CR names.
  candidates:
    - name: bandit-arm-0
      weight: 50
    - name: bandit-arm-1
      weight: 50
