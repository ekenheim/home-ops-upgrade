---
# Seldon v2 Model — bandit arm-0.
# The model artifact is written to MinIO by the Dagster bandit-pipeline after
# each training run (MLflow logs → s3://bandit/models/arm-0/latest).
# The 's3' rclone remote in seldon-core-secret (datasci ns) points to MinIO.
# Until the first pipeline run this Model will show Ready:False (no artifact yet).
apiVersion: mlops.seldon.io/v1alpha1
kind: Model
metadata:
  name: bandit-arm-0
  namespace: development
  labels:
    app.kubernetes.io/name: bandit
    app.kubernetes.io/component: seldon-arm
spec:
  storageUri: "s3://bandit/models/arm-0/latest"
  # seldon-core-secret lives in datasci (the server's namespace); the agent
  # resolves it there when loading the artifact.
  secretName: seldon-core-secret
  # mlflow runtime on MLServer can load any MLflow-logged model directly.
  requirements:
    - mlflow
  memory: 100Mi
