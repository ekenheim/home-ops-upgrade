---
# Grid Resilience Dashboard (Streamlit). Exposed via Ingress at grid-reliance-dashboard.${SECRET_DOMAIN}.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-reliance-dashboard
  namespace: development
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: dashboard
spec:
  # Set to 1 once ghcr.io/ekenheim/grid-resilience-dashboard:v1.0.9 is published; ImagePullBackOff until then.
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: grid-reliance
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grid-reliance
        app.kubernetes.io/component: dashboard
    spec:
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dashboard
          image: ghcr.io/ekenheim/grid-resilience-dashboard:v1.0.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          envFrom:
            - secretRef:
                name: grid-reliance-minio
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
