---
# Dashboard at grid-reliance-dashboard.${SECRET_DOMAIN} (internal ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grid-reliance-dashboard
  namespace: development
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: dashboard
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grid Reliance Dashboard
    gethomepage.dev/group: Development
spec:
  ingressClassName: internal
  rules:
    - host: grid-reliance-dashboard.${SECRET_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grid-reliance-dashboard
                port:
                  number: 8501
  tls:
    - hosts:
        - grid-reliance-dashboard.${SECRET_DOMAIN}
