---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grid-reliance-db-init-sql
  namespace: development
data:
  init.sql: |
    -- Bootstrap schema and synthetic data for development.
    -- Safe to re-run: CREATE TABLE uses IF NOT EXISTS, INSERT uses ON CONFLICT DO NOTHING.

    CREATE TABLE IF NOT EXISTS weather_obs (
        timestamp      TIMESTAMPTZ        NOT NULL,
        region_id      TEXT               NOT NULL,
        wind_speed_mps DOUBLE PRECISION   NOT NULL,
        PRIMARY KEY (timestamp, region_id)
    );

    -- 8 760 h × 4 SE price-zones = 35 040 rows of synthetic hourly wind data (full year 2024).
    INSERT INTO weather_obs (timestamp, region_id, wind_speed_mps)
    SELECT
        ts::timestamptz                                                         AS timestamp,
        region_id,
        GREATEST(0.1,
            8.0
            + 4.0 * sin(2 * pi() * extract(doy FROM ts) / 365.0)
            + 3.0 * (2 * random() - 1.0)
        )                                                                       AS wind_speed_mps
    FROM generate_series(
        '2024-01-01 00:00:00'::timestamptz,
        '2024-12-31 23:00:00'::timestamptz,
        '1 hour'::interval
    ) AS ts
    CROSS JOIN (VALUES ('SE1'), ('SE2'), ('SE3'), ('SE4')) AS regions(region_id)
    ON CONFLICT DO NOTHING;

    SELECT count(*) AS rows_in_weather_obs FROM weather_obs;
