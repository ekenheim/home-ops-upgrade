---
# Schema bootstrap + synthetic seed data for the gridreliance database.
# Replaces the unavailable ghcr.io/ekenheim/grid-resilience-generator image.
# Safe to re-run; all statements are idempotent (IF NOT EXISTS / ON CONFLICT DO NOTHING).
# Remove this Job once the real Generator image is published and re-enabled.
apiVersion: batch/v1
kind: Job
metadata:
  name: grid-reliance-db-init
  namespace: development
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: db-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grid-reliance
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16
          command: ["sh", "-c", "psql $DATABASE_URL -f /sql/init.sql"]
          envFrom:
            - secretRef:
                name: grid-reliance-postgres
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: grid-reliance-db-init-sql
