---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# MinIO/S3 credentials for API, Pipeline, Dashboard (Bronze/Silver/Gold or single bucket).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-minio
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: grid-reliance-minio
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Store full URL in Bitwarden (e.g. http://minio.ns.svc:9000) to avoid double scheme.
        MINIO_ENDPOINT: "{{ .MINIO_ENDPOINT }}"
        MINIO_ACCESS_KEY: "{{ .MINIO_ACCESS_KEY }}"
        MINIO_SECRET_KEY: "{{ .MINIO_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: grid-reliance-minio
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# ENTSO-E Transparency API token for fetching grid data. Store in Bitwarden as key "grid-reliance-entsoe"
# with field ENTSOE_API_KEY (or ENTSOE_TOKEN). Injected into pipeline and Dagster run pods.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-entsoe
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: grid-reliance-entsoe
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        ENTSOE_API_KEY: "{{ .ENTSOE_API_KEY }}"
  dataFrom:
    - extract:
        key: grid-reliance-entsoe
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Postgres for grid-reliance pipeline (run storage) and generator. PgBouncer OK for pipeline.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grid-reliance-postgres
  namespace: development
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: grid-reliance-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        PG_CONNECTION_STRING: 'postgresql://{{ .user }}:{{ .password }}@{{ index . "pgbouncer-host" }}:5432/{{ .dbname }}'
        DATABASE_URL: 'postgresql://{{ .user }}:{{ .password }}@{{ index . "pgbouncer-host" }}:5432/{{ .dbname }}'
  dataFrom:
    - extract:
        key: postgres-pguser-gridreliance
