---
# One-shot job to backfill synthetic data. Run once (or on demand); uses DATABASE_URL from grid-reliance-postgres.
apiVersion: batch/v1
kind: Job
metadata:
  name: grid-reliance-generator
  namespace: development
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: generator
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grid-reliance
        app.kubernetes.io/component: generator
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: generator
          image: ghcr.io/ekenheim/grid-resilience-generator:v1.0.15
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: grid-reliance-postgres
          env:
            - name: GENERATOR_SEED
              value: "42"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
