---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Grid Reliance app code (development namespace): pipeline code server.
# Data platform infra (OBCs, API, RayJob, Spark) lives in kubernetes/apps/datasci/grid-reliance-infra
# because the Spark operator and Ray cluster are scoped to datasci and Rook OBCs create
# their credentials in the same namespace as the claim.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  # - ./api  # API lives in datasci/grid-reliance-infra; it reads directly from the Gold OBC there.
  - ./pipeline
  - ./generator
