---
# Dagster code location (gRPC server on port 4000). Register in Dagster UI at
# grid-reliance-pipeline.development.svc.cluster.local:4000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-reliance-pipeline
  namespace: development
  labels:
    app.kubernetes.io/name: grid-reliance
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grid-reliance
      app.kubernetes.io/component: pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grid-reliance
        app.kubernetes.io/component: pipeline
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: pipeline
          image: ghcr.io/ekenheim/grid-resilience-pipeline:v1.0.16
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: grid-reliance-postgres
            - secretRef:
                name: grid-reliance-entsoe
          env:
            - name: DAGSTER_HOME
              value: "/opt/dagster"
            - name: DAGSTER_MODULE_NAME
              value: "pipeline.dagster.repository"
            - name: DAGSTER_CURRENT_IMAGE
              value: "ghcr.io/ekenheim/grid-resilience-pipeline:v1.0.16"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.datasci.svc.cluster.local:5000"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 5
