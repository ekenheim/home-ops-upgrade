---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# MinIO credentials for pipeline (config/state/raw buckets).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hempriser-minio
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: hempriser-minio
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        MINIO_ENDPOINT: "http://{{ .MINIO_ENDPOINT }}"
        MINIO_ACCESS_KEY: "{{ .MINIO_ACCESS_KEY }}"
        MINIO_SECRET_KEY: "{{ .MINIO_SECRET_KEY }}"
        # Optional: MINIO_USE_SSL for HTTPS MinIO
  dataFrom:
    - extract:
        key: hempriser-minio
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Postgres connection string for the hempriser pipeline (feature_matrix / zone_summaries).
# Routes via PgBouncer — acceptable for pipeline workloads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hempriser-postgres
  namespace: development
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: hempriser-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        PG_CONNECTION_STRING: 'postgresql://{{ .user }}:{{ .password }}@{{ index . "pgbouncer-host" }}:5432/{{ .dbname }}'
  dataFrom:
    - extract:
        key: postgres-pguser-hempriser
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Dagster internal storage DB. Must use the direct primary (not PgBouncer) to avoid
# SCRAM-SHA-256 SASL failures that PgBouncer causes for Dagster's own schema management.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hempriser-dagster-db
  namespace: development
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: hempriser-dagster-db
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        DAGSTER_PG_HOST: '{{ .host }}'
        DAGSTER_PG_PORT: '{{ .port }}'
        DAGSTER_PG_DB_NAME: '{{ .dbname }}'
        DAGSTER_PG_USER: '{{ .user }}'
        DAGSTER_PG_PASSWORD: '{{ .password }}'
  dataFrom:
    - extract:
        key: postgres-pguser-dagster
