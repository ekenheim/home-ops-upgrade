---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Google Sheets credentials for contact form submissions.
# Store in Bitwarden as key "marketing-agency-google" with fields:
#   - GOOGLE_SHEET_ID: the spreadsheet ID from the Google Sheet URL
#   - GOOGLE_SERVICE_ACCOUNT_KEY: base64-encoded JSON service account key
#     (encode with: cat service-account.json | base64 -w0)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: marketing-agency-google
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: marketing-agency-google
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        GOOGLE_SHEET_ID: "{{ .GOOGLE_SHEET_ID }}"
        GOOGLE_SERVICE_ACCOUNT_KEY: "{{ .GOOGLE_SERVICE_ACCOUNT_KEY | b64dec }}"
  dataFrom:
    - extract:
        key: marketing-agency-google
