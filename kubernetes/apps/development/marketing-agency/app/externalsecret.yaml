---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Read-only Strapi API token for the marketing agency frontend.
# In Strapi admin: Settings → API Tokens → create a Read-only token.
# Store in Bitwarden as key "marketing-agency-strapi" with field STRAPI_API_TOKEN.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: marketing-agency-strapi-token
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: marketing-agency-strapi-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        STRAPI_API_TOKEN: "{{ .STRAPI_API_TOKEN }}"
  dataFrom:
    - extract:
        key: marketing-agency-strapi
