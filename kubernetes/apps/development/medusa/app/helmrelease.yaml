# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: medusa
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      medusa-server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          migrate-db:
            image:
              repository: ghcr.io/ekenheim/ecom/medusa
              tag: "9496114"
              pullPolicy: Always
            env:
              NODE_ENV: production
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: DATABASE_URL
              REDIS_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: REDIS_URL
            command:
              - node_modules/.bin/medusa
              - db:migrate
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

        containers:
          main:
            image:
              repository: ghcr.io/ekenheim/ecom/medusa
              tag: "91076e7"
              pullPolicy: Always
            env:
              NODE_ENV: production
              PORT: "9000"
              MEDUSA_WORKER_MODE: server
              DISABLE_MEDUSA_ADMIN: "false"
              STRIPE_API_KEY: "sk_test_placeholder"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: DATABASE_URL
              REDIS_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: REDIS_URL
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: JWT_SECRET
              COOKIE_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: COOKIE_SECRET
              STORE_CORS:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: STORE_CORS
              ADMIN_CORS:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: ADMIN_CORS
              AUTH_CORS:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: AUTH_CORS
              MEDUSA_BACKEND_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: MEDUSA_BACKEND_URL
              MEILISEARCH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: meilisearch-secret
                    key: MEILI_MASTER_KEY
            envFrom:
              - configMapRef:
                  name: medusa-config
              - secretRef:
                  name: medusa-secret
              - secretRef:
                  name: medusa-s3-secret
            command:
              - node_modules/.bin/medusa
              - start
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 9000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 9000
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi
        pod:
          imagePullSecrets:
            - name: ghcr-pull
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

      medusa-worker:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/ekenheim/ecom/medusa
              tag: "9496114"
              pullPolicy: Always
            env:
              NODE_ENV: production
              PORT: "9000"
              MEDUSA_WORKER_MODE: worker
              DISABLE_MEDUSA_ADMIN: "true"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: DATABASE_URL
              REDIS_URL:
                valueFrom:
                  secretKeyRef:
                    name: medusa-db-secret
                    key: REDIS_URL
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: JWT_SECRET
              COOKIE_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: medusa-secret
                    key: COOKIE_SECRET
              MEILISEARCH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: meilisearch-secret
                    key: MEILI_MASTER_KEY
            envFrom:
              - configMapRef:
                  name: medusa-config
              - secretRef:
                  name: medusa-secret
              - secretRef:
                  name: medusa-s3-secret
            command:
              - node_modules/.bin/medusa
              - start
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
        pod:
          imagePullSecrets:
            - name: ghcr-pull

      storefront:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-medusa:
            image:
              repository: busybox
              tag: "1.37"
            command:
              - sh
              - -c
              - until nc -z medusa-medusa-server 9000; do echo waiting for medusa; sleep 2; done
        containers:
          main:
            image:
              repository: ghcr.io/ekenheim/ecom/storefront
              tag: b60245b
              pullPolicy: Always
            env:
              MEDUSA_BACKEND_URL: "http://medusa-medusa-server:9000"
              NEXT_PUBLIC_BASE_URL: "https://storefront.${SECRET_DOMAIN}"
              NEXT_PUBLIC_DEFAULT_REGION: "se"
              NEXT_PUBLIC_MEDUSA_BACKEND_URL: "https://medusa.${SECRET_DOMAIN}"
            envFrom:
              - configMapRef:
                  name: storefront-config
              - secretRef:
                  name: storefront-secret
              - secretRef:
                  name: medusa-s3-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  initialDelaySeconds: 20
                  periodSeconds: 20
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
        pod:
          imagePullSecrets:
            - name: ghcr-pull

    service:
      medusa-server:
        controller: medusa-server
        type: ClusterIP
        ports:
          http:
            port: 9000
            protocol: HTTP
      storefront:
        controller: storefront
        type: ClusterIP
        ports:
          http:
            port: 8000
            protocol: HTTP

    ingress:
      main:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Medusa
          gethomepage.dev/icon: mdi:shopping
          gethomepage.dev/group: Development
        hosts:
          - host: &medusaHost "medusa.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: medusa-server
                  port: http
          - host: &storefrontHost "storefront.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: storefront
                  port: http
        tls:
          - hosts:
              - *medusaHost
              - *storefrontHost

    persistence:
      medusa-app-config:
        type: configMap
        name: medusa-app-config
        advancedMounts:
          medusa-server:
            main:
              - path: /app/medusa-config.js
                subPath: medusa-config.js
                readOnly: true
          medusa-worker:
            main:
              - path: /app/medusa-config.js
                subPath: medusa-config.js
                readOnly: true
