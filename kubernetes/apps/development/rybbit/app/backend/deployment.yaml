---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rybbit-backend
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rybbit-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rybbit-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/rybbit-io/rybbit-backend:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: CLICKHOUSE_HOST
              value: http://rybbit-clickhouse.development.svc.cluster.local:8123
            - name: CLICKHOUSE_DB
              value: analytics
            - name: BASE_URL
              value: https://rybbit.${SECRET_DOMAIN}
            - name: DISABLE_SIGNUP
              value: "false"
            - name: DISABLE_TELEMETRY
              value: "true"
          envFrom:
            - secretRef:
                name: rybbit-postgres
            - secretRef:
                name: rybbit-app
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
