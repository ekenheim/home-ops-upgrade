---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rybbit-client
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rybbit-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rybbit-client
    spec:
      containers:
        - name: client
          image: ghcr.io/rybbit-io/rybbit-client:latest
          ports:
            - name: http
              containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_BACKEND_URL
              value: https://rybbit.${SECRET_DOMAIN}
            - name: NEXT_PUBLIC_DISABLE_SIGNUP
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
