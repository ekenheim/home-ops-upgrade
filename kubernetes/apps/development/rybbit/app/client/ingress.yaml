---
# Rybbit analytics at rybbit.${SECRET_DOMAIN}.
# /api/* routes to the backend (port 3001); everything else goes to the Next.js client (port 3002).
# This mirrors the upstream Caddy configuration.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rybbit
  namespace: development
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Rybbit
    gethomepage.dev/group: Development
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: external
  rules:
    - host: rybbit.${SECRET_DOMAIN}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rybbit-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rybbit-client
                port:
                  number: 3002
  tls:
    - hosts:
        - rybbit.${SECRET_DOMAIN}
