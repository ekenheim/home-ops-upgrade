---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Postgres for Rybbit. Uses the PRIMARY host (not PgBouncer) because PgBouncer runs in
# transaction pooling mode which can break schema migrations that require session mode.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rybbit-postgres
  namespace: development
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: rybbit-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        POSTGRES_HOST: '{{ .host }}'
        POSTGRES_PORT: '{{ .port }}'
        POSTGRES_DB: '{{ .dbname }}'
        POSTGRES_USER: '{{ .user }}'
        POSTGRES_PASSWORD: '{{ .password }}'
  dataFrom:
    - extract:
        key: postgres-pguser-rybbit
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Rybbit app secrets. Store in Bitwarden Secrets Manager as key "rybbit-secrets" with fields:
# BETTER_AUTH_SECRET, CLICKHOUSE_PASSWORD, MAPBOX_TOKEN (optional).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rybbit-app
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rybbit-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        BETTER_AUTH_SECRET: '{{ .BETTER_AUTH_SECRET }}'
        CLICKHOUSE_PASSWORD: '{{ .CLICKHOUSE_PASSWORD }}'
        MAPBOX_TOKEN: '{{ .MAPBOX_TOKEN }}'
  dataFrom:
    - extract:
        key: rybbit-secrets
