---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rybbit
  namespace: development
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controllers:
      rybbit:
        replicas: 1
        containers:
          backend:
            image:
              repository: ghcr.io/rybbit-io/rybbit-backend
              tag: v2.5.0
            env:
              NODE_ENV: production
              CLICKHOUSE_HOST: http://rybbit-clickhouse.development.svc.cluster.local:8123
              CLICKHOUSE_DB: analytics
              CLICKHOUSE_USER: default
              BASE_URL: https://rybbit.${SECRET_DOMAIN}
              DISABLE_SIGNUP: "false"
              DISABLE_TELEMETRY: "true"
              PGSSLMODE: disable
            envFrom:
              - secretRef:
                  name: rybbit-postgres
              - secretRef:
                  name: rybbit-app
          client:
            image:
              repository: ghcr.io/rybbit-io/rybbit-client
              tag: v2.5.0
            env:
              NODE_ENV: production
              NEXT_PUBLIC_BACKEND_URL: https://rybbit.${SECRET_DOMAIN}
              NEXT_PUBLIC_DISABLE_SIGNUP: "false"
              BETTER_AUTH_URL: https://rybbit.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: rybbit-app

    service:
      backend:
        controller: rybbit
        ports:
          http:
            port: 3001
      client:
        controller: rybbit
        ports:
          http:
            port: 3002

    ingress:
      main:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Rybbit
          gethomepage.dev/group: Development
          gethomepage.dev/icon: https://rybbit.com/rybbit-text.svg
          nginx.ingress.kubernetes.io/proxy-body-size: 10m
        hosts:
          - host: rybbit.${SECRET_DOMAIN}
            paths:
              - path: /api
                pathType: Prefix
                service:
                  identifier: backend
                  port: http
              - path: /
                pathType: Prefix
                service:
                  identifier: client
                  port: http
        tls:
          - hosts:
              - rybbit.${SECRET_DOMAIN}
