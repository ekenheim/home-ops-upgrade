---
# Strapi CMS (admin + API). Exposed via Ingress at strapi.${SECRET_DOMAIN}.
#
# Bootstrap phase: uses a minimal custom bootstrap image (node:22-alpine + create-strapi-app).
# On first run it creates a vanilla Strapi v5 project in /srv/app using the Postgres
# credentials from strapi-postgres secret. NODE_ENV=development enables Content-Type Builder
# so you can define your schema. Once your custom image is ready, replace the image and
# set NODE_ENV=production.
#
# naskio/strapi is NOT used: it is a v4 image and breaks on v5 admin panel builds.
# Strapi publishes NO official images: https://docs.strapi.io/dev-docs/installation/docker
# See README.md for the production Dockerfile and bootstrap image instructions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strapi-cms
  namespace: development
  labels:
    app.kubernetes.io/name: strapi
    app.kubernetes.io/component: cms
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: strapi
      app.kubernetes.io/component: cms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strapi
        app.kubernetes.io/component: cms
    spec:
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: cms
          image: ghcr.io/ekenheim/strapi-bootstrap@sha256:16ccc81083f79ea7dbf69ea69222fc56b02168b9e8da27710e1681aca6fbfad4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 1337
              protocol: TCP
          env:
            - name: NODE_ENV
              value: development
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "1337"
            - name: URL
              value: "https://strapi.${SECRET_DOMAIN}"
          envFrom:
            - secretRef:
                name: strapi-postgres
            - secretRef:
                name: strapi-app-keys
          volumeMounts:
            - name: strapi-data
              mountPath: /srv/app
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /_health
              port: http
            failureThreshold: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: strapi-data
          persistentVolumeClaim:
            claimName: strapi-data
