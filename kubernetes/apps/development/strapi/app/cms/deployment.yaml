---
# Strapi CMS (admin + API). Exposed via Ingress at strapi.${SECRET_DOMAIN}.
#
# Bootstrap phase: uses a minimal custom bootstrap image (node:22-alpine + create-strapi-app).
# On first run it creates a vanilla Strapi v5 project in /srv/app using the Postgres
# credentials from strapi-postgres secret. NODE_ENV=development enables Content-Type Builder
# so you can define your schema. Once your custom image is ready, replace the image and
# set NODE_ENV=production.
#
# naskio/strapi is NOT used: it is a v4 image and breaks on v5 admin panel builds.
# Strapi publishes NO official images: https://docs.strapi.io/dev-docs/installation/docker
# See README.md for the production Dockerfile and bootstrap image instructions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strapi-cms
  namespace: development
  labels:
    app.kubernetes.io/name: strapi
    app.kubernetes.io/component: cms
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: strapi
      app.kubernetes.io/component: cms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strapi
        app.kubernetes.io/component: cms
    spec:
      restartPolicy: Always
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: seed-and-schema
          image: ghcr.io/ekenheim/strapi-bootstrap@sha256:785dcd505abc846fd6a598e66b67a05f33bf10c0d7f2c65a54b60b64f00a0718
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              APP_DIR="/srv/app"
              # Seed the Strapi project template on first run
              if [ ! -f "$APP_DIR/package.json" ]; then
                echo "Seeding Strapi project from image template to PVC..."
                cp -a /srv/template/. "$APP_DIR/"
              fi
              # Write the Arm content type schema if not already present.
              # Strapi v5 reads schema.json on startup and auto-generates REST endpoints.
              SCHEMA_DIR="$APP_DIR/src/api/arm/content-types/arm"
              if [ ! -f "$SCHEMA_DIR/schema.json" ]; then
                echo "Installing Arm content type schema..."
                mkdir -p "$SCHEMA_DIR"
                cp /schemas/schema.json "$SCHEMA_DIR/schema.json"
              fi
              # Ensure translate plugin + DeepL provider are installed and configured.
              # Handles existing PVCs that were seeded before the plugin was added.
              if [ ! -d "$APP_DIR/node_modules/strapi-plugin-translate" ]; then
                echo "Installing strapi-plugin-translate and deepl provider..."
                cd "$APP_DIR"
                npm install strapi-plugin-translate@2.0.0-next.4 strapi-provider-translate-deepl@1.3.0-next.4
              fi
              # Always sync plugin config from the image template.
              cp /srv/template/config/plugins.ts "$APP_DIR/config/plugins.ts"
          volumeMounts:
            - name: strapi-data
              mountPath: /srv/app
            - name: arm-schema
              mountPath: /schemas
              readOnly: true
      containers:
        - name: cms
          image: ghcr.io/ekenheim/strapi-bootstrap@sha256:785dcd505abc846fd6a598e66b67a05f33bf10c0d7f2c65a54b60b64f00a0718
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cd /srv/app
              echo "Starting Strapi in development mode..."
              exec npm run develop
          ports:
            - name: http
              containerPort: 1337
              protocol: TCP
          env:
            - name: NODE_ENV
              value: development
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3072"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "1337"
            - name: URL
              value: "https://strapi.${SECRET_DOMAIN}"
            - name: CORS_ORIGIN
              value: "https://strapi.${SECRET_DOMAIN},https://marketing-agency.${SECRET_DOMAIN},https://${SECRET_SECONDARY_DOMAIN}"
          envFrom:
            - secretRef:
                name: strapi-postgres
            - secretRef:
                name: strapi-app-keys
            - secretRef:
                name: strapi-deepl
          volumeMounts:
            - name: strapi-data
              mountPath: /srv/app
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /_health
              port: http
            failureThreshold: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: strapi-data
          persistentVolumeClaim:
            claimName: strapi-data
        - name: arm-schema
          configMap:
            name: strapi-arm-schema
