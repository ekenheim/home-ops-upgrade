---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Postgres for Strapi CMS. Uses the PRIMARY host (not PgBouncer) because PgBouncer runs in
# transaction pooling mode which breaks Strapi's schema migrations that require session mode.
# Crunchy PGO exposes secret postgres-pguser-strapi once the user is added to cluster.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: strapi-postgres
  namespace: development
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: strapi-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        DATABASE_CLIENT: "postgres"
        DATABASE_HOST: '{{ .host }}'
        DATABASE_PORT: '{{ .port }}'
        DATABASE_NAME: '{{ .dbname }}'
        DATABASE_USERNAME: '{{ .user }}'
        DATABASE_PASSWORD: '{{ .password }}'
        DATABASE_SSL: "false"
  dataFrom:
    - extract:
        key: postgres-pguser-strapi
---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
# Strapi app keys (APP_KEYS, JWT, salts). Store in Bitwarden as key "strapi-app" with fields:
# APP_KEYS, API_TOKEN_SALT, ADMIN_JWT_SECRET, JWT_SECRET, TRANSFER_TOKEN_SALT, ENCRYPTION_KEY.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: strapi-app-keys
  namespace: development
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: strapi-app-keys
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        APP_KEYS: "{{ .APP_KEYS }}"
        API_TOKEN_SALT: "{{ .API_TOKEN_SALT }}"
        ADMIN_JWT_SECRET: "{{ .ADMIN_JWT_SECRET }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
        TRANSFER_TOKEN_SALT: "{{ .TRANSFER_TOKEN_SALT }}"
        ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"
  dataFrom:
    - extract:
        key: strapi-app
