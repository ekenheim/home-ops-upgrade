---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  interval: 30m
  chart:
    spec:
      chart: spegel
      version: 0.7.0
      sourceRef:
        kind: HelmRepository
        name: spegel
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    spegel:
      containerdSock: /run/containerd/containerd.sock
      containerdRegistryConfigPath: /var/lib/spegel/containerd/certs.d
      retryCount: 3
      retryDelay: 5s
      timeout: 30s
    service:
      registry:
        hostPort: 29999
      metrics:
        enabled: true
        port: 8080
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    volumeMounts:
      - name: spegel-config
        mountPath: /var/lib/spegel/containerd/certs.d
    volumes:
      - name: spegel-config
        emptyDir: {}
