---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfs-stale-watchdog
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nfs-stale-watchdog
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nfs-stale-watchdog
roleRef:
  kind: ClusterRole
  name: nfs-stale-watchdog
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: nfs-stale-watchdog
    namespace: kube-tools
