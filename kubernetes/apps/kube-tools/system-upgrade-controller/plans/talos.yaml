---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/upgrade.cattle.io/plan_v1.json
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: talos
  annotations:
    upgrade.cattle.io/force: "true"
spec:
  version: ${TALOS_VERSION}
  serviceAccountName: system-upgrade-controller
  secrets:
    - name: talos
      path: /var/run/secrets/talos.dev
      ignoreUpdates: true
  concurrency: 1
  exclusive: true
  jobActiveDeadlineSecs: 2700
  nodeSelector:
    matchExpressions:
      - key: feature.node.kubernetes.io/system-os_release.ID
        operator: In
        values: ["talos"]
      - key: kubernetes.io/hostname
        operator: NotIn
        values: ["worker3"]
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  # Drain before Talos's own upgrade reboot so PDB-protected pods (postgres,
  # knative activator, nginx-external) don't stall the upgrade past the Job
  # deadline. disableEviction force-deletes pods that PDBs would otherwise
  # block — acceptable for a planned host reboot.
  drain:
    force: true
    disableEviction: true
    deleteEmptydirData: true
    ignoreDaemonSets: true
    skipWaitForDeleteTimeout: 5
    timeout: 10m
  # No prepare: see git history. talosctl 1.13.3's health check insists on
  # all nodes schedulable, but SUC cordons the target before running prepare
  # — so it can never pass. Talos's upgrade itself refuses to run on an
  # unhealthy cluster (etcd quorum, control plane), so this safety net
  # survives without the duplicate pre-flight.
  upgrade:
    image: ghcr.io/siderolabs/talosctl:${TALOS_VERSION}
    envs:
      - name: NODE_IP
        valueFrom:
          fieldRef:
            fieldPath: status.hostIP
    args:
      - --nodes=$(NODE_IP)
      - upgrade
      - --image=factory.talos.dev/metal-installer/${TALOS_SCHEMATIC}:${TALOS_VERSION}
      - --preserve
      - --reboot-mode=powercycle
      # talosctl upgrade has two independent defaults that must both be
      # disabled. --drain=true (default) cordons the target and evicts
      # pods — and since the SUC upgrade pod runs ON the target node,
      # talosctl's own drain evicts it before the upgrade RPC fires.
      # --wait=true (default) then blocks waiting for the node to come
      # back. SUC already cordons + drains via the init container, so
      # the upgrade pod just needs to send the RPC and exit.
      - --drain=false
      - --wait=false
