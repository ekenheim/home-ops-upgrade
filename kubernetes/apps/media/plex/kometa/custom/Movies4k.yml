templates:
  Chart Alpha:
    sort_title: +<<num>>_<<collection_name>>
    sync_mode: sync
    collection_order: alpha
    collection_minimum: 3
    delete_below_minimum: true
  Chart Release:
    sort_title: +_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Best of:
    imdb_list: https://www.imdb.com/search/title/?title_type=feature&release_date=<<year>>-01-01,<<year>>-12-31&sort=user_rating,desc&count=100
    sort_title: +_Best of <<year>>
    sync_mode: sync
    summary: Best Movies of <<year>>, according to IMDb top rated.
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Studio:
    optional:
      - company
    tmdb_company: <<company>>
    sort_title: +4_<<collection_name>>
    sync_mode: sync
    collection_order: alpha
    collection_minimum: 3
    delete_below_minimum: true
  IMDb Genre:
    default:
      title: movie
      limit: 100
    imdb_search:
      type: <<title>>
      release.after: 1990-01-01
      rating.gte: 5.0
      rating.lte: 10.0
      votes.gte: 100000
      genre: <<genre>>
      sort_by: rating.desc
      limit: <<limit>>
    sort_title: +++_<<collection_name>>
    sync_mode: sync
    collection_order: alpha
    collection_minimum: 3
    delete_below_minimum: true
  Other Genre:
    sort_title: +++_<<collection_name>>
    sync_mode: sync
    collection_order: alpha
    collection_minimum: 3
    delete_below_minimum: true
  Actor:
    actor: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Actor Director:
    actor: tmdb
    director: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Actor Director Writer:
    actor: tmdb
    director: tmdb
    writer: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Actor Writer:
    actor: tmdb
    writer: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Director:
    director: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Director Writer:
    director: tmdb
    writer: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Writer:
    writer: tmdb
    tmdb_person: <<person>>
    sort_title: ++++_<<collection_name>>
    sync_mode: sync
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
  Collection:
    optional:
      - collection
      - movie
    tmdb_collection_details: <<collection>>
    tmdb_movie: <<movie>>
    sync_mode: sync
    item_assets: true
    collection_order: release
    collection_minimum: 3
    delete_below_minimum: true
