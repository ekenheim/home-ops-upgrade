# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app posterizarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      posterizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/mikefarah/yq
              tag: 4.53.3@sha256:11a1f0b604b13dbbdc662260d8db6f644b22d8553122a25c1b5b2e8713ca6977
              pullPolicy: IfNotPresent
            command:
              - "/bin/sh"
            args:
              - "/app/config-file/init-config.sh"
            envFrom:
            - secretRef:
                name: posterizarr-secret
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/fscorrupt/posterizarr
              # Pinned to an existing digest. Upstream deleted the `v3.0.0` tag
              # and garbage-collected the digest Renovate last pinned (bddcf44),
              # so helm upgrades hit ImagePullBackOff -> timeout -> rollback to a
              # crashlooping old release. e13e1a7 is the newest digest still
              # present in ghcr and is verified healthy with the wrapper below.
              # Renovate can't resolve the (now-missing) v3.0.0 tag, so it won't
              # bump this until upstream restores a tag.
              tag: v3.0.0@sha256:e13e1a782a31a6b79db55ac0e6510890270c3ad30d380b2eb5b5de510bc7ed98
            # Upstream workaround (remove once a fixed image is published).
            #
            # The v3.0.0 images report version 3.0.0, which is greater than the
            # latest tagged release (2.2.x), so Start.ps1 flags them as an
            # "InsiderBuild". The InsiderBuild branch of the config-integrity
            # check fetches config.example.json from the git ref `v3.0.0`
            # (github.com/fscorrupt/posterizarr/raw/v3.0.0/config.example.json),
            # which does not exist upstream -> HTTP 404 -> the PowerShell
            # process errors out and the container exits (CrashLoopBackOff).
            # The bug is already fixed on the upstream `dev` branch (the
            # InsiderBuild/v3.0.0 path was dropped) but no published image
            # carries the fix yet.
            #
            # /app is root-owned and this container runs as uid 1000, so we
            # can't patch /app/Start.ps1 in place. Instead we run a patched
            # copy from /tmp that redirects the fetch to the `dev` ref (which
            # serves the correct 3.0 example config, HTTP 200). Everything in
            # Start.ps1 resolves via $env:APP_ROOT=/app, not the script's own
            # location, so running the copy from /tmp is safe. The wrapper
            # mirrors the image's /app/start.sh; port is hardcoded to 8000 to
            # match the image default and the `http` service port (the HR sets
            # neither APP_PORT nor DISABLE_UI), and to keep the script free of
            # `$` so Flux envsubst leaves it untouched.
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                cp /app/Start.ps1 /tmp/Start.ps1
                sed -i 's#raw/v3.0.0/config.example.json#raw/dev/config.example.json#' /tmp/Start.ps1
                export PYTHONPATH=/app
                echo "Starting FastAPI Web UI (API + Frontend) on port 8000..."
                python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --log-level critical --no-access-log &
                echo "Starting Posterizarr PowerShell automation..."
                exec /usr/bin/catatonit -- pwsh -NoProfile /tmp/Start.ps1
            env:
              TZ: ${TIMEZONE}
            # NFS stale-handle watchdog: when the NAS export gets re-exported
            # (NAS reboot, share recreation), the existing kernel mount handle
            # for /config/watcher dies with ESTALE and the watcher loop silently
            # stops processing trigger files. test -d returns non-zero on ESTALE,
            # so 3 consecutive failures restart the container, which remounts
            # cleanly against the current inode.
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "test -d /config/watcher"]
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 512M
              limits:
                memory: 4096M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
    service:
      app:
        controller: posterizarr
        ports:
          http:
            port: 8000
    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Video
          gethomepage.dev/name: Posterizarr
          gethomepage.dev/icon: posterizarr.png
          gethomepage.dev/description: Media Poster Automation
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 140
        # The posterizarr config PVC was originally provisioned with /config
        # owned by root:568 (drwxrwsr-x) and config.json owned by 1000:568.
        # Without 568 in the process group list the init container's
        # `mv /tmp/config.json /config/config.json` fails with EACCES on
        # the unlink half (no group-write on /config), so the rendered
        # config silently never refreshes — which is how a stale Fanart.tv
        # key sat on disk for ~a month. Adding 568 as a supplemental group
        # gives the process group-write on /config without changing the
        # primary uid/gid the upstream image expects.
        supplementalGroups: [568]
    persistence:
      config:
        existingClaim: *app
      posterizarr-watcher:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_DATA:=temp}
        globalMounts:
        - path: /config/watcher
          subPath: Media/ppm/watcher
      config-file:
        type: configMap
        defaultMode: 511
        name: posterizarr-configmap
        globalMounts:
          - path: /app/config-file
      assets:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /assets
      manualassets:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /manualassets
          subPath: manualassets
      assetsbackup:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /assetsbackup
          subPath: assetsbackup


