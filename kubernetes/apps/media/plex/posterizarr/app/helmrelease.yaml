# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app posterizarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      posterizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/mikefarah/yq
              tag: 4.52.5@sha256:603ebff15eb308a05f1c5b8b7613179cad859aed3ec9fdd04f2ef5d32345950e
              pullPolicy: IfNotPresent
            command:
              - "/bin/sh"
            args:
              - "/app/config-file/init-config.sh"
            envFrom:
            - secretRef:
                name: posterizarr-secret
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/fscorrupt/posterizarr
              tag: 2.2.37@sha256:3caf82e4b7cea9781b079c219bc4085b5832b7fbb60443cd83c6b6bbea016b06
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 100m
                memory: 512M
              limits:
                memory: 4096M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
    service:
      app:
        controller: posterizarr
        ports:
          http:
            port: 8000
    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Video
          gethomepage.dev/name: Posterizarr
          gethomepage.dev/icon: posterizarr.png
          gethomepage.dev/description: Media Poster Automation
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 140
        # The posterizarr config PVC was originally provisioned with /config
        # owned by root:568 (drwxrwsr-x) and config.json owned by 1000:568.
        # Without 568 in the process group list the init container's
        # `mv /tmp/config.json /config/config.json` fails with EACCES on
        # the unlink half (no group-write on /config), so the rendered
        # config silently never refreshes — which is how a stale Fanart.tv
        # key sat on disk for ~a month. Adding 568 as a supplemental group
        # gives the process group-write on /config without changing the
        # primary uid/gid the upstream image expects.
        supplementalGroups: [568]
    persistence:
      config:
        existingClaim: *app
      posterizarr-watcher:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_DATA:=temp}
        globalMounts:
        - path: /config/watcher
          subPath: Media/ppm/watcher
      config-file:
        type: configMap
        defaultMode: 511
        name: posterizarr-configmap
        globalMounts:
          - path: /app/config-file
      assets:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /assets
      manualassets:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /manualassets
          subPath: manualassets
      assetsbackup:
        type: nfs
        server: ${NAS_IP:=temp}
        path: ${SECRET_NFS_PPM:=temp}
        globalMounts:
        - path: /assetsbackup
          subPath: assetsbackup


