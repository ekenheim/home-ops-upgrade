---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./cronjob.yaml
  - ../../../../../templates/volsync
configMapGenerator:
  - name: posterizarr-configmap
    files:
      - config.json.template=./config/config.json.template
      - init-config.sh=./config/init-config.sh
      - overlay-innerglow.png=./config/overlay-innerglow.png
      - backgroundoverlay-innerglow.png=./config/backgroundoverlay-innerglow.png
      - Rocky.ttf=./config/Rocky.ttf
    options:
      disableNameSuffixHash: true
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # config.json.template carries ${...} placeholders that are NOT Flux vars:
    # init-config.sh fills FanartTvAPIKey/tvdbapi/tmdbtoken/PlexToken at runtime
    # via `yq env(...)` from posterizarr-secret, and the Discord ${WebhookID}/
    # ${WebhookToken} are inert placeholders. Flux strict-mode envsubst otherwise
    # fails on the first unset one (FANARTTV_API_KEY), blocking the whole
    # kustomization. Disable post-build substitution on the generated ConfigMap.
    kustomize.toolkit.fluxcd.io/substitute: disabled