---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nas-gatus-ep
  labels:
    gatus.io/enabled: "true"
data:
  config.yaml: |
    endpoints:
      - name: nas
        group: infra
        url: http://${NAS_IP}/login
        interval: 1m
        conditions: ["[STATUS] == 200"]
        alerts: [{ type: discord }]
        ui:
          hide-url: true
          hide-hostname: true
      # Catches NFS hangs/re-exports before consumer pods crash-loop.
      - name: nas-nfs
        group: infra
        url: tcp://${NAS_IP}:2049
        interval: 1m
        conditions: ["[CONNECTED] == true"]
        alerts: [{ type: discord }]
        ui:
          hide-url: true
          hide-hostname: true
