---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - alertmanager-dashboard.yaml
  - bandit-experiments-dashboard.yaml
  - external-secrets-dashboard.yaml
  - flyte-app-dashboard.yaml
  - immich-app-dashboard.yaml
  - mlflow-app-dashboard.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
    grafana_folder: Data
  labels:
    grafana_dashboard: "1"
# These dashboards are literal ConfigMap resources, so generatorOptions.annotations
# above never apply to them. Patch the substitute-disable annotation onto each so
# Flux envsubst leaves Grafana template vars like ${datasource} untouched.
patches:
  - target:
      kind: ConfigMap
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: not-used
        annotations:
          kustomize.toolkit.fluxcd.io/substitute: disabled
