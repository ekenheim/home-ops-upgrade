---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.26.1-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: seldon-overview-grafana-dashboard
  labels:
    grafana_dashboard: "1"
data:
  seldon_overview_dashboard.json: |
    {
      "title": "Seldon Core v2 Overview",
      "uid": "seldonCoreOverview",
      "schemaVersion": 27,
      "version": 2,
      "editable": true,
      "timezone": "",
      "style": "dark",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "hide": 2
          },
          {
            "name": "Model",
            "type": "query",
            "datasource": "${datasource}",
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "query": {
              "query": "label_values(envoy_cluster_external_upstream_rq{envoy_cluster_name=~\".*_http\"}, envoy_cluster_name)",
              "refId": "ModelVar"
            },
            "regex": "/(.+)_\\d+_http/"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Envoy Proxy Scraped",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{job=~\".*seldon-v2-envoy.*\"})"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Controller Pod Scraped",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{job=~\".*seldon-v2-controller.*\"})"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Server Pods Scraped",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{job=~\".*seldon-v2-servers.*\"})"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Loaded Models",
          "datasource": "${datasource}",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "count(envoy_cluster_external_upstream_rq{envoy_cluster_name=~\".*_http\",envoy_cluster_name!~\"admin.*|mirror.*|xds.*\"})"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request Rate (req/s)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (envoy_cluster_name) (rate(envoy_cluster_external_upstream_rq_completed{envoy_cluster_name=~\"($Model)_\\\\d+_http\"}[5m]))",
              "legendFormat": "{{ envoy_cluster_name }}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Error Rate (non-2xx)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (envoy_cluster_name, envoy_response_code_class) (rate(envoy_cluster_external_upstream_rq_xx{envoy_cluster_name=~\"($Model)_\\\\d+_http\",envoy_response_code_class!=\"2\"}[5m]))",
              "legendFormat": "{{ envoy_cluster_name }} ({{ envoy_response_code_class }}xx)"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "p95 Latency",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le, envoy_cluster_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"($Model)_\\\\d+_http\"}[5m])))",
              "legendFormat": "{{ envoy_cluster_name }}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "p50 Latency",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum by (le, envoy_cluster_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=~\"($Model)_\\\\d+_http\"}[5m])))",
              "legendFormat": "{{ envoy_cluster_name }}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Total Requests by Model",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "envoy_cluster_external_upstream_rq_completed{envoy_cluster_name=~\"($Model)_\\\\d+_http\"}",
              "legendFormat": "{{ envoy_cluster_name }}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          }
        }
      ]
    }
