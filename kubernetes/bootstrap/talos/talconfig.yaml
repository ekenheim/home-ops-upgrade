# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.12.6
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.35.4

clusterName: &cluster home-kubernetes
endpoint: https://192.168.50.10:6443
clusterPodNets:
  - "10.42.0.0/16"
clusterSvcNets:
  - "10.43.0.0/16"
additionalApiServerCertSans: &sans
  - "192.168.50.10"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans
cniConfig:
  name: none

nodes:
  - hostname: "worker2"
    ipAddress: "192.168.50.32"
    installDisk: "/dev/sdb"
    talosImageURL: factory.talos.dev/metal-installer/a30c16a32db3c99cb35f22401fad96807f80896dfc86aa4ec716ed6b4aff09de:v1.12.6
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 04:0e:3c:21:b2:3f
        dhcp: true
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"
  - hostname: "master1"
    ipAddress: "192.168.50.31"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/metal-installer/a30c16a32db3c99cb35f22401fad96807f80896dfc86aa4ec716ed6b4aff09de:v1.12.6
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 48:21:0b:36:2d:6a
        dhcp: true
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"
        vip:
          ip: "192.168.50.10"
  - hostname: "master2"
    ipAddress: "192.168.50.33"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/metal-installer/a30c16a32db3c99cb35f22401fad96807f80896dfc86aa4ec716ed6b4aff09de:v1.12.6
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 48:21:0b:51:95:9d
        dhcp: true
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"
        vip:
          ip: "192.168.50.10"
  - hostname: "master3"
    ipAddress: "192.168.50.34"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/metal-installer/a30c16a32db3c99cb35f22401fad96807f80896dfc86aa4ec716ed6b4aff09de:v1.12.6
    controlPlane: true
    networkInterfaces:
      # 2.5G Internal Port
      - deviceSelector:
          hardwareAddr: 58:47:ca:75:60:0f
        dhcp: true
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"
        dhcpOptions:
            routeMetric: 1024
        vip:
          ip: "192.168.50.36"
      # 2.5G Internal Port
      - deviceSelector:
          hardwareAddr: 58:47:ca:75:60:10
        dhcp: true
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"
        dhcpOptions:
            routeMetric: 2048

  - hostname: "worker3"
    ipAddress: "192.168.50.37"
    installDisk: "/dev/nvme1n1"
    # Schematic encodes node-specific addons; for Talos upgrade use a 1.12.x schematic with same addons and set e.g. .../NEW_SCHEMATIC:v1.12.3
    talosImageURL: factory.talos.dev/metal-installer/96f8c146a67c80daad900d3fc1a6976fe11062321eee9ab6ae2a6aea88b2d26e:v1.12.6
    controlPlane: false
    networkInterfaces:
      # 2x 10G bonded via LACP
      - interface: bond0
        bond:
          mode: 802.3ad
          lacpRate: fast
          xmitHashPolicy: layer3+4
          miimon: 100
          updelay: 200
          downdelay: 200
          deviceSelectors:
            - hardwareAddr: "58:47:ca:7e:9f:cf"
            - hardwareAddr: "58:47:ca:7e:9f:d0"
        dhcp: true
        mtu: 9000
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.50.1"

patches:
  # Configure containerd
  - |-
    machine:
      files:
        - op: create
          path: /etc/cri/conf.d/20-customization.part
          content: |-
            [plugins."io.containerd.grpc.v1.cri"]
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
            [plugins."io.containerd.grpc.v1.cri".containerd]
              discard_unpacked_layers = false
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              discard_unpacked_layers = false
    # Configure NFS Mounts
  - |-
    machine:
      files:
        - op: overwrite
          path: /etc/nfsmount.conf
          permissions: 420
          content: |-
            [ NFSMount_Global_Options ]
              nfsvers = 4.2
              hard = True
              noatime = True
              nodiratime = True
              rsize = 131072
              wsize = 131072
              nconnect = 8

  # Disable search domain everywhere
  - |-
    machine:
      network:
        disableSearchDomain: true

  # Enable cluster discovery
  - |-
    cluster:
      discovery:
        registries:
          kubernetes:
            disabled: false
          service:
            disabled: false

  # Configure kubelet
  - |-
    machine:
      kubelet:
        extraArgs:
          image-gc-low-threshold: 50
          image-gc-high-threshold: 55
          rotate-server-certificates: true
          max-pods: "250"
          system-reserved: "memory=2Gi"
          kube-reserved: "memory=1Gi"
        nodeIP:
          validSubnets:
            - "192.168.50.0/24"

  # Force nameserver
  - |-
    machine:
      network:
        nameservers:
          - 192.168.1.1
          - 1.1.1.1

  # Configure NTP
  - |-
    machine:
      time:
        disabled: false
        servers:
          - time.cloudflare.com

  # Custom sysctl settings
  - |-
    machine:
      sysctls:
        fs.inotify.max_queued_events: "65536"
        fs.inotify.max_user_watches: "524288"
        fs.inotify.max_user_instances: "8192"
        net.core.rmem_max: "2500000"
        net.core.wmem_max: "2500000"

  # Mount openebs-hostpath in kubelet
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/openebs/local
            type: bind
            source: /var/openebs/local
            options: ["bind", "rshared", "rw"]

  # Stable /dev/zwave symlink for Aeotec Z-Stick 10 Pro (CP2105 10c4:ea70)
  # if01 = Z-Wave port; if00 = Zigbee port
  - |-
    machine:
      udev:
        rules:
          - SUBSYSTEM=="tty", ATTRS{idVendor}=="10c4", ATTRS{idProduct}=="ea70", ENV{ID_USB_INTERFACE_NUM}=="01", SYMLINK+="zwave"

  # Disable predictable NIC naming
  #- |-
  #  machine:
  #    install:
  #      extraKernelArgs:
  #        - net.ifnames=0

  # Add kernel modules
  #- |-
  #  machine:
  #    kernel:
  #      modules:
  #        - name: nvidia
  #        - name: nvidia_uvm
  #        - name: nvidia_drm
  #        - name: nvidia_modeset

controlPlane:
  patches:
    # Cluster configuration
    - |-
      cluster:
        allowSchedulingOnMasters: true
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        coreDNS:
          disabled: true
        proxy:
          disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

    # ETCD configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
          advertisedSubnets:
            - "192.168.50.0/24"

    # Configure API server admission to allow privileged by default.
    # Namespaces opt into restrictions via pod-security labels.
    - |-
      cluster:
        apiServer:
          admissionControl:
            - name: PodSecurity
              configuration:
                apiVersion: pod-security.admission.config.k8s.io/v1alpha1
                kind: PodSecurityConfiguration
                defaults:
                  enforce: privileged
                  enforce-version: latest
                  audit: restricted
                  audit-version: latest
                  warn: restricted
                  warn-version: latest
                exemptions:
                  namespaces: []
                  runtimeClasses: []
                  usernames: []

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:admin
            allowedKubernetesNamespaces:
              - kube-tools

    # Enable hostDNS:
    - |-
      machine:
        features:
          hostDNS:
            enabled: true
            forwardKubeDNSToHost: true
            resolveMemberNames: true
